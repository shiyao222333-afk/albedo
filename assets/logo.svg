<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#191922"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="platGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aebfe0"/>
    </linearGradient>
    <linearGradient id="essGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9d6ff"/>
      <stop offset="100%" stop-color="#7d9bff"/>
    </linearGradient>
    <linearGradient id="vapGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3ebff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c9d6ff" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="essGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#aebfe0" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="circleClip"><circle cx="256" cy="256" r="224"/></clipPath>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" stroke="#aebfe0" stroke-width="1.5" stroke-opacity="0.15"/>

  <g opacity="0.05" clip-path="circleClip">
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#aebfe0"/>
    </pattern>
    <rect x="32" y="32" width="448" height="448" fill="url(#grid)"/>
  </g>

  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="url(#platGrad)" stroke-width="1" stroke-opacity="0.12" stroke-dasharray="6 18"/>
    <circle cx="0" cy="0" r="195" fill="none" stroke="#c9d6ff" stroke-width="0.5" stroke-opacity="0.06"/>

    <!-- === 坩埚（炼真容器） === -->
    <g filter="url(#shadow)">
      <path d="M-46,118 L-34,96 L34,96 L46,118 Z" fill="#2a2f45" stroke="#3d4566" stroke-width="1.5"/>
      <rect x="-42" y="110" width="84" height="11" rx="2" fill="#1a1e30"/>
      <path d="M-66,58 Q-70,98 -34,106 L34,106 Q70,98 66,58 Z" fill="#33406b" stroke="#5a7fd4" stroke-width="1.5"/>
      <path d="M-66,58 Q-70,98 -34,106 L34,106 Q70,98 66,58 Z" fill="#c9d6ff" fill-opacity="0.06"/>
      <ellipse cx="0" cy="58" rx="66" ry="14" fill="#3d5a9a" stroke="#7d9bff" stroke-width="1.5"/>
      <ellipse cx="0" cy="58" rx="66" ry="14" fill="#0a0a12" fill-opacity="0.25"/>
    </g>

    <!-- 釜内发光真质 -->
    <ellipse cx="0" cy="56" rx="54" ry="9" fill="url(#vapGrad)" filter="url(#essGlow)" opacity="0.9"/>

    <!-- === 升腾的纯质白烟（动画） === -->
    <g filter="url(#glow)" opacity="0.85">
      <path d="M-22,50 Q-30,10 -14,-30 Q-26,-60 -8,-95" fill="none" stroke="url(#vapGrad)" stroke-width="4" stroke-linecap="round">
        <animate attributeName="opacity" values="0.85;0.3;0.85" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M18,48 Q28,8 12,-34 Q24,-66 6,-100" fill="none" stroke="url(#vapGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.6s" repeatCount="indefinite"/>
      </path>
      <path d="M0,46 Q-6,6 4,-36 Q-4,-70 8,-104" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="4.2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === 放大镜检查镜（验真） === -->
    <g transform="translate(70, 30) rotate(34)" filter="url(#shadow)">
      <circle cx="0" cy="0" r="26" fill="#0c0c16" stroke="url(#platGrad)" stroke-width="4"/>
      <circle cx="0" cy="0" r="26" fill="#c9d6ff" fill-opacity="0.10"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#e3ebff" stroke-width="1" opacity="0.5"/>
      <rect x="19" y="19" width="9" height="34" rx="4" fill="#aebfe0" stroke="#e3ebff" stroke-width="0.8"/>
    </g>

    <!-- === 角落齿轮（一致风格，缓慢旋转） === -->
    <g transform="translate(-118, -64)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0 -118 -64" to="360 -118 -64" dur="12s" repeatCount="indefinite" additive="replace"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="url(#platGrad)" stroke-width="2" opacity="0.7"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#c9d6ff" stroke-width="1.5" opacity="0.5"/>
      <g stroke="#c9d6ff" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
        <line x1="0" y1="-20" x2="0" y2="-26"/>
        <line x1="14.1" y1="-14.1" x2="18.4" y2="-18.4"/>
        <line x1="20" y1="0" x2="26" y2="0"/>
        <line x1="14.1" y1="14.1" x2="18.4" y2="18.4"/>
        <line x1="0" y1="20" x2="0" y2="26"/>
        <line x1="-14.1" y1="14.1" x2="-18.4" y2="18.4"/>
        <line x1="-20" y1="0" x2="-26" y2="0"/>
        <line x1="-14.1" y1="-14.1" x2="-18.4" y2="-18.4"/>
      </g>
    </g>

    <!-- === 数据节点 === -->
    <g transform="translate(118, -72)" filter="url(#glow)">
      <circle cx="0" cy="0" r="5" fill="#c9d6ff" opacity="0.9"/>
      <circle cx="0" cy="0" r="10" fill="none" stroke="#c9d6ff" stroke-width="1" opacity="0.4"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#7d9bff" stroke-width="0.8" opacity="0.2"/>
      <line x1="0" y1="5" x2="0" y2="18" stroke="#c9d6ff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <circle cx="0" cy="20" r="2.5" fill="#c9d6ff" opacity="0.7"/>
    </g>

    <!-- === 火花粒子（白） === -->
    <g opacity="0.7">
      <circle cx="-40" cy="150" r="2" fill="#ffffff"><animate attributeName="cy" values="150;128;104" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0.3;0" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="6" cy="155" r="1.5" fill="#e3ebff"><animate attributeName="cy" values="155;132;108" dur="1.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0.3;0" dur="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="44" cy="150" r="2" fill="#c9d6ff"><animate attributeName="cy" values="150;122;96" dur="1.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0.2;0" dur="1.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- === 脉冲光环 === -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#c9d6ff" stroke-width="1.5" opacity="0.15">
      <animate attributeName="r" values="130;160;190" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.6">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="80" y1="460" x2="432" y2="460" stroke="url(#platGrad)" stroke-width="0.5" opacity="0.15"/>
</svg>
